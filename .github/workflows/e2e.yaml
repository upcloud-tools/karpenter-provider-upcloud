name: E2E

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'apis/**'
      - 'go.*'
      - 'test/**'
      - '.github/workflows/e2e.yaml'
  pull_request:
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'apis/**'
      - 'go.*'
      - 'test/**'
      - '.github/workflows/e2e.yaml'

env:
  GO_VERSION: '1.26'

permissions:
  contents: read

jobs:
  e2e:
    # Only run when live credentials are configured as repo secrets.
    if: ${{ secrets.UPCLOUD_TOKEN != '' && secrets.UPCLOUD_KUBERNETES_CLUSTER_ID != '' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - capacityType: on-demand
            plan: CLOUDNATIVE-2xCPU-4GB
          - capacityType: spot
            plan: GPU-SPOT-4xCPU-8GB
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Live provisioning e2e (${{ matrix.capacityType }})
        env:
          UPCLOUD_TOKEN: ${{ secrets.UPCLOUD_TOKEN }}
          UPCLOUD_KUBERNETES_CLUSTER_ID: ${{ secrets.UPCLOUD_KUBERNETES_CLUSTER_ID }}
          UPCLOUD_E2E_PROVISION: "1"
          UPCLOUD_E2E_PLAN: ${{ matrix.plan }}
          UPCLOUD_E2E_CAPACITY_TYPE: ${{ matrix.capacityType }}
        run: go test ./test/e2e/ -run TestLiveCloudProviderCreate -v -timeout 20m

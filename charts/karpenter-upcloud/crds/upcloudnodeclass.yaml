apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: upcloudnodeclasses.karpenter.upcloud.com
spec:
  group: karpenter.upcloud.com
  names:
    kind: UpCloudNodeClass
    listKind: UpCloudNodeClassList
    plural: upcloudnodeclasses
    singular: upcloudnodeclass
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                zone:
                  type: string
                plan:
                  type: string
                storageGB:
                  type: integer
                  minimum: 10
                storageTier:
                  type: string
                  enum: [maxiops, standard, hdd]
                sshKeys:
                  type: array
                  items:
                    type: string
                kubeletArgs:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                      value:
                        type: string
                labels:
                  type: object
                  additionalProperties:
                    type: string
                taints:
                  type: array
                  items:
                    type: object
                    properties:
                      effect:
                        type: string
                      key:
                        type: string
                      value:
                        type: string
                antiAffinity:
                  type: boolean
                utilityNetworkAccess:
                  type: boolean
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
